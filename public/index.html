<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xterm-mcp</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.min.css"
    />
    <style>
      :root {
        --bg: #111317;
        --panel: #1b1f27;
        --text: #e8edf7;
        --muted: #95a1b5;
        --accent: #60a5fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1d2431, var(--bg));
        color: var(--text);
      }

      .bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1rem;
        background: #0b0f16;
        border-bottom: 1px solid #253047;
        font-size: 0.9rem;
      }

      .badge {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .hint {
        color: var(--muted);
      }

      #terminal {
        margin: 0.75rem;
        border: 1px solid #253047;
        border-radius: 10px;
        background: var(--panel);
        overflow: hidden;
      }

      .xterm {
        padding: 0.4rem;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <span class="badge">xterm-mcp</span>
      <span id="status" class="hint">connecting...</span>
      <span class="hint">API: <code>/api/type</code> <code>/api/keypress</code></span>
    </div>
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const container = document.getElementById("terminal");
      const token = new URLSearchParams(window.location.search).get("token");
      const wsProto = location.protocol === "https:" ? "wss" : "ws";
      const wsUrl = `${wsProto}://${location.host}/ws${token ? `?token=${encodeURIComponent(token)}` : ""}`;

      const term = new Terminal({
        cursorBlink: true,
        convertEol: true,
        fontFamily: "JetBrains Mono, Menlo, Consolas, monospace",
        fontSize: 14,
        theme: {
          background: "#1b1f27",
          foreground: "#e8edf7",
          cursor: "#93c5fd"
        }
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      fitAddon.fit();

      let socket;

      const connect = () => {
        socket = new WebSocket(wsUrl);

        socket.addEventListener("open", () => {
          statusEl.textContent = "connected";
          socket.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
        });

        socket.addEventListener("message", (event) => {
          let payload;
          try {
            payload = JSON.parse(event.data);
          } catch {
            return;
          }
          if (payload.type === "hello") {
            if (payload.buffered) {
              term.write(payload.buffered);
            }
            return;
          }
          if (payload.type === "output") {
            term.write(payload.data);
            return;
          }
          if (payload.type === "exit") {
            statusEl.textContent = `session exited (${payload.exitCode})`;
          }
        });

        socket.addEventListener("close", () => {
          statusEl.textContent = "disconnected (retrying...)";
          setTimeout(connect, 1200);
        });
      };

      term.onData((data) => {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: "input", data }));
        }
      });

      window.addEventListener("resize", () => {
        fitAddon.fit();
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
        }
      });

      connect();
      term.focus();
    </script>
  </body>
</html>
